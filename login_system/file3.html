<script src="https://demo.yubico.com/js/u2f-api.js"></script>
<script>
    function startYubiKeyAuth(section) {
        fetch('/authenticate', { method: 'POST' })
            .then(response => response.json())
            .then(request => {
                u2f.sign(request[0], function(data) {
                    fetch('/complete_authenticate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(response => response.text())
                    .then(result => {
                        if (result.includes('successful')) {
                            if (section === 'main') {
                                document.getElementById('login-section').classList.add('hidden');
                                document.getElementById('content-section').classList.remove('hidden');
                            } else if (section === 'charles') {
                                document.getElementById('charles-login-section').classList.add('hidden');
                                document.getElementById('charles-content-section').classList.remove('hidden');
                            }
                        } else {
                            alert('Authentication failed');
                        }
                    });
                });
            });
    }
</script>
