<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi-Intel - Login</title>
    <style>
        /* Same styles as before */
        body {
            font-family: Arial, sans-serif;
            background-image: url('LOGO.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            margin: 0;
            padding: 0;
            position: relative; /* Required for body::before to work */
            color: #ffffff; /* Bright text */
        }
        header {
			background-color: #000f1e;
			color: white;
            text-align: center;
            padding: 20px 0;
        }
        .login-form {
            max-width: 300px;
            margin: 20px auto;
            padding: 20px;
            background-color: black;
            color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .login-form input,
        .login-form button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }
        .login-form button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <!-- <header>
         <img src="LOGO.png" alt="LOGO" style="max-width: 20%; height: auto;"> 
        <h1>LOGIN PAGE</h1>
    </header> -->
    <section>
		<h2><a href="/login_system/main.html" style="color:#93c9ff;">Home Page</a></h2>
        <div class="login-form">
            <h2>Random</h2>
            <input type="text" id="username1" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login('username1', 'password', 'next.html', 'password')">Login</button>
        </div>
        <div class="login-form">
            <h2>VIP YubiKey</h2>
            <input type="text" id="username2" placeholder="Username">
            <input type="text" id="yubikey" placeholder="YubiKey OTP">
            <button onclick="login('username2', 'yubikey', 'file3.html', 'yubikey')">Login</button>
        </div>
    </section>
    <script>
        function login(usernameId, credentialId, redirectUrl, type) {
            var username = document.getElementById(usernameId).value;
            var credential = document.getElementById(credentialId).value;

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "authenticate.php", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    if (xhr.responseText === "success") {
                        window.location.href = redirectUrl;
                    } else {
                        alert('Authentication failed: ' + xhr.responseText);
                    }
                }
            };
            xhr.send("username=" + encodeURIComponent(username) + 
                     "&credential=" + encodeURIComponent(credential) + 
                     "&type=" + encodeURIComponent(type));
        }
    </script>
</body>
</html>
